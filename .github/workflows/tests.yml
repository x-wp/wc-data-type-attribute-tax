name: Tests

on:
  pull_request:
  push:
    branches:
      - master
      - beta
      - feat/**

jobs:
  phpunit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: xdebug

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Install WP-CLI if missing
        run: |
          if command -v wp >/dev/null 2>&1; then
            wp --info
            exit 0
          fi

          curl -fsSL -o /tmp/wp-cli.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x /tmp/wp-cli.phar
          sudo mv /tmp/wp-cli.phar /usr/local/bin/wp
          wp --info

      - name: Start test services
        run: composer test:env:start

      - name: Install WordPress test environment
        run: composer test:install

      - name: Run PHPUnit
        run: composer test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: build/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  semantic-release-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release Dry Run
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/github
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
